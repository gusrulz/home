# AC Occupancy Automation
#
# Turns on AC in rooms that are too hot or cold when Emily or Tom is home.
# Turns off all AC units when the last person leaves.
# Includes a night/morning schedule for room switching.
#
# Room schedule:
#   10pm - 5am : bedroom only       (MyZone: Bedroom)
#   5am  - 6am : lounge + bedroom   (MyZone: Lounge)
#   6am  - 8am : lounge only        (MyZone: Lounge)
#   8am  - 10pm: lounge + study           (MyZone: Lounge)
#
# To activate, add this to configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages/

input_number:
  ac_temp_too_hot:
    name: "AC Upper Temperature Threshold"
    min: 20
    max: 35
    step: 0.5
    unit_of_measurement: "°C"
    initial: 24
    icon: mdi:thermometer-high

  ac_temp_too_cold:
    name: "AC Lower Temperature Threshold"
    min: 10
    max: 22
    step: 0.5
    unit_of_measurement: "°C"
    initial: 18
    icon: mdi:thermometer-low

automation:
  - id: "ac_on_when_home_and_uncomfortable"
    alias: "AC: Turn on when home and room is uncomfortable"
    description: >
      When someone arrives home, when a room temperature changes, or every 10
      minutes while someone is home — turn on the appropriate rooms for the
      current time of day if any room is outside the comfort range.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - person.emily
          - person.tom
        to: "home"
      - platform: state
        entity_id:
          - climate.ac
          - climate.ac_bedroom
          - climate.ac_lounge
          - climate.ac_study
        attribute: current_temperature
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: person.emily
            state: "home"
          - condition: state
            entity_id: person.tom
            state: "home"
    action:
      - variables:
          too_hot: "{{ states('input_number.ac_temp_too_hot') | float(24) }}"
          too_cold: "{{ states('input_number.ac_temp_too_cold') | float(18) }}"
      - variables:
          any_too_hot: >
            {{ state_attr('climate.ac_lounge', 'current_temperature') | float(-1) > too_hot or
               state_attr('climate.ac_bedroom', 'current_temperature') | float(-1) > too_hot or
               state_attr('climate.ac_study', 'current_temperature') | float(-1) > too_hot }}
          any_too_cold: >
            {{ (state_attr('climate.ac_lounge', 'current_temperature') | float(-1) > 0 and
                state_attr('climate.ac_lounge', 'current_temperature') | float(-1) < too_cold) or
               (state_attr('climate.ac_bedroom', 'current_temperature') | float(-1) > 0 and
                state_attr('climate.ac_bedroom', 'current_temperature') | float(-1) < too_cold) or
               (state_attr('climate.ac_study', 'current_temperature') | float(-1) > 0 and
                state_attr('climate.ac_study', 'current_temperature') | float(-1) < too_cold) }}
      - if:
          - condition: template
            value_template: "{{ any_too_hot or any_too_cold }}"
        then:
          - service: climate.set_hvac_mode
            target:
              entity_id: climate.ac
            data:
              hvac_mode: "{{ 'cool' if any_too_hot else 'heat' }}"
          - choose:
              # 10pm – 5am: bedroom only
              - conditions:
                  - condition: time
                    after: "22:00:00"
                    before: "05:00:00"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: select.ac_myzone
                    data:
                      option: Bedroom
                  - service: climate.turn_on
                    target:
                      entity_id: climate.ac_bedroom
              # 5am – 6am: lounge + bedroom
              - conditions:
                  - condition: time
                    after: "05:00:00"
                    before: "06:00:00"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: select.ac_myzone
                    data:
                      option: Lounge
                  - service: climate.turn_on
                    target:
                      entity_id:
                        - climate.ac_lounge
                        - climate.ac_bedroom
              # 6am – 8am: lounge only
              - conditions:
                  - condition: time
                    after: "06:00:00"
                    before: "08:00:00"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: select.ac_myzone
                    data:
                      option: Lounge
                  - service: climate.turn_on
                    target:
                      entity_id: climate.ac_lounge
              # 8am – 10pm: lounge + study
              - conditions:
                  - condition: time
                    after: "08:00:00"
                    before: "22:00:00"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: select.ac_myzone
                    data:
                      option: Lounge
                  - service: climate.turn_on
                    target:
                      entity_id:
                        - climate.ac_lounge
                        - climate.ac_study

  - id: "ac_off_when_everyone_away"
    alias: "AC: Turn off all when everyone leaves"
    description: >
      When a person leaves home and no one else is still home,
      set MyZone to Inactive then turn off all AC units.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - person.emily
          - person.tom
        from: "home"
    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: person.emily
            state: "home"
      - condition: not
        conditions:
          - condition: state
            entity_id: person.tom
            state: "home"
    action:
      - service: select.select_option
        target:
          entity_id: select.ac_myzone
        data:
          option: Inactive
      - service: climate.turn_off
        target:
          entity_id:
            - climate.ac
            - climate.ac_bedroom
            - climate.ac_lounge
            - climate.ac_front_room
            - climate.ac_study

  - id: "ac_night_mode_10pm"
    alias: "AC: Night mode at 10pm"
    description: >
      Set MyZone to Bedroom first (auto-activates bedroom), then turn off
      lounge and study.
    mode: single
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: person.emily
            state: "home"
          - condition: state
            entity_id: person.tom
            state: "home"
    action:
      - service: select.select_option
        target:
          entity_id: select.ac_myzone
        data:
          option: Bedroom
      - service: climate.turn_off
        target:
          entity_id:
            - climate.ac_lounge
            - climate.ac_study

  - id: "ac_morning_lounge_5am"
    alias: "AC: Morning - turn on lounge at 5am"
    description: >
      Set MyZone to Lounge first (auto-activates lounge), then explicitly
      turn on lounge.
    mode: single
    trigger:
      - platform: time
        at: "05:00:00"
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: person.emily
            state: "home"
          - condition: state
            entity_id: person.tom
            state: "home"
      - condition: template
        value_template: >
          {% set too_hot = states('input_number.ac_temp_too_hot') | float(24) %}
          {% set too_cold = states('input_number.ac_temp_too_cold') | float(18) %}
          {{ state_attr('climate.ac_lounge', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_bedroom', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_study', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_lounge', 'current_temperature') | float(99) < too_cold
             or state_attr('climate.ac_bedroom', 'current_temperature') | float(99) < too_cold
             or state_attr('climate.ac_study', 'current_temperature') | float(99) < too_cold }}
    action:
      - service: select.select_option
        target:
          entity_id: select.ac_myzone
        data:
          option: Lounge
      - service: climate.turn_on
        target:
          entity_id: climate.ac_lounge

  - id: "ac_bedroom_off_6am"
    alias: "AC: Turn off bedroom at 6am"
    description: >
      Confirm MyZone is on Lounge, then turn off bedroom.
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: person.emily
            state: "home"
          - condition: state
            entity_id: person.tom
            state: "home"
      - condition: template
        value_template: >
          {% set too_hot = states('input_number.ac_temp_too_hot') | float(24) %}
          {% set too_cold = states('input_number.ac_temp_too_cold') | float(18) %}
          {{ state_attr('climate.ac_lounge', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_bedroom', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_study', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_lounge', 'current_temperature') | float(99) < too_cold
             or state_attr('climate.ac_bedroom', 'current_temperature') | float(99) < too_cold
             or state_attr('climate.ac_study', 'current_temperature') | float(99) < too_cold }}
    action:
      - service: select.select_option
        target:
          entity_id: select.ac_myzone
        data:
          option: Lounge
      - service: climate.turn_off
        target:
          entity_id: climate.ac_bedroom

  - id: "ac_study_on_8am"
    alias: "AC: Turn on study at 8am"
    description: >
      Turn on study vent at 8am. MyZone is already on Lounge from 5am.
    mode: single
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: person.emily
            state: "home"
          - condition: state
            entity_id: person.tom
            state: "home"
      - condition: template
        value_template: >
          {% set too_hot = states('input_number.ac_temp_too_hot') | float(24) %}
          {% set too_cold = states('input_number.ac_temp_too_cold') | float(18) %}
          {{ state_attr('climate.ac_lounge', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_bedroom', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_study', 'current_temperature') | float(-1) > too_hot
             or state_attr('climate.ac_lounge', 'current_temperature') | float(99) < too_cold
             or state_attr('climate.ac_bedroom', 'current_temperature') | float(99) < too_cold
             or state_attr('climate.ac_study', 'current_temperature') | float(99) < too_cold }}
    action:
      - service: climate.turn_on
        target:
          entity_id: climate.ac_study
